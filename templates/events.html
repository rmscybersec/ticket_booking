<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Événements</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .event {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div style="margin-bottom: 20px;">
    <button onclick="goToEvents()">Événements</button>
    <button onclick="goToBookings()">Mes réservations</button>
    <button id="adminBtn" onclick="goToAdmin()" style="display:none;">Admin Dashboard</button>
    <button onclick="logout()">Déconnexion</button>
</div>

<script>
    function goToEvents() {
        window.location.href = "/events_page";
    }

    function goToBookings() {
        window.location.href = "/my_bookings_page";
    }

    function goToAdmin() {
        window.location.href = "/admin_dashboard";
    }

    function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/login_page";
    }

    // Afficher le bouton admin seulement si role = admin
    const role = localStorage.getItem("role");
    if (role === "admin") {
        document.getElementById("adminBtn").style.display = "inline-block";
    }
</script>

<h1>Liste des événements</h1>
<div id="events"></div>

<script>
    async function loadEvents() {
        const token = localStorage.getItem("token");

        const response = await fetch("/events", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await response.json();

        const container = document.getElementById("events");
        container.innerHTML = "";

        data.forEach(event => {
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = `
                <h3>${event.title}</h3>
                <p>${event.description}</p>
                <p><strong>Date :</strong> ${event.date}</p>
                <p><strong>Catégorie :</strong> ${event.category}</p>
                <p><strong>Prix :</strong> ${event.price} $</p>
                <button onclick="bookEvent(${event.id})">Réserver</button>
            `;
            container.appendChild(div);
        });
    }

    async function bookEvent(eventId) {
        const token = localStorage.getItem("token");

        const response = await fetch("/book_event", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ event_id: eventId, quantity: 1 })
        });

        const data = await response.json();
        alert(data.message || data.Erreur);
    }

    loadEvents();
</script>

</body>
</html>
