<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .event {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .danger {
            background: #dc3545;
        }
        .danger:hover {
            background: #b52a37;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .form-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div style="margin-bottom: 20px;">
    <button onclick="goToEvents()">Événements</button>
    <button onclick="goToBookings()">Mes réservations</button>
    <button id="adminBtn" onclick="goToAdmin()" style="display:none;">Admin Dashboard</button>
    <button onclick="logout()">Déconnexion</button>
</div>

<script>
    function goToEvents() {
        window.location.href = "/events_page";
    }

    function goToBookings() {
        window.location.href = "/my_bookings_page";
    }

    function goToAdmin() {
        window.location.href = "/admin_dashboard";
    }

    function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/login_page";
    }

    // Afficher le bouton admin seulement si role = admin
    const role = localStorage.getItem("role");
    if (role === "admin") {
        document.getElementById("adminBtn").style.display = "inline-block";
    }
</script>


<h1>Tableau de bord Administrateur</h1>

<h2>Créer un événement</h2>
<div class="form-box">
    <input id="title" placeholder="Titre">
    <input id="date" placeholder="Date (YYYY-MM-DD HH:MM:SS)">
    <input id="category" placeholder="Catégorie">
    <input id="price" placeholder="Prix">
    <input id="capacity" placeholder="Capacité">
    <textarea id="description" placeholder="Description"></textarea>
    <button onclick="createNewEvent()">Créer</button>
</div>

<h2>Liste des événements</h2>
<div id="events"></div>

<script>
    async function loadEvents() {
    const response = await fetch("/events");
    const data = await response.json();

    const container = document.getElementById("events");
    container.innerHTML = "";

    data.forEach(event => {
        const div = document.createElement("div");
        div.className = "event";
        div.innerHTML = `
            <h3>${event.title}</h3>
            <p>${event.description}</p>
            <p><strong>Date :</strong> ${event.date}</p>
            <p><strong>Catégorie :</strong> ${event.category}</p>
            <p><strong>Prix :</strong> ${event.price} $</p>
            <button onclick="deleteEvent(${event.id})" class="danger">Supprimer</button>
        `;
        container.appendChild(div);
    });
}

    async function createNewEvent() {
        const token = localStorage.getItem("token");

        const body = {
            title: document.getElementById("title").value,
            date: document.getElementById("date").value,
            category: document.getElementById("category").value,
            price: Number(document.getElementById("price").value),
            capacity: Number(document.getElementById("capacity").value),
            description: document.getElementById("description").value
        };

        const response = await fetch("/add_event", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        });

        const data = await response.json();
        alert(data.message || data.Erreur);
        loadEvents();
    }


    async function deleteEvent(id) {
        const token = localStorage.getItem("token");

        const response = await fetch("/event/delete/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await response.json();
        alert(data.message || data.Erreur);
        loadEvents();
    }

    loadEvents();
</script>

</body>
</html>
